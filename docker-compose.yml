services:

  mysqldb:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transfers_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  app:
    image: transfers-api:0.1.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transfers-api
    depends_on:
      - mysqldb
    ports:
      - "8080:8080"

    environment:
      # ---- Business ----
      TRANSFER_MIN_AMOUNT: 1

      # ---- MySQL ----
      MYSQL_CONNECT_TIMEOUT: 10s
      MYSQL_HOST: mysqldb
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: transfers_db

      MYSQL_MAX_OPEN_CONNS: 25
      MYSQL_MAX_IDLE_CONNS: 25

    restart: always

volumes:
  mysql_data: